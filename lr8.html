<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Лабораторная работа №8 | Массивы и объекты</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        .card {
            background: white;
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 25px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .card h2 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 1.8rem;
            border-left: 5px solid #764ba2;
            padding-left: 15px;
        }

        .numbers-panel {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 15px;
            padding: 20px;
            color: white;
        }

        .numbers-panel h3 {
            margin-bottom: 15px;
            font-size: 1.3rem;
        }

        .numbers-display {
            background: rgba(255,255,255,0.2);
            border-radius: 10px;
            padding: 15px;
            font-family: 'Courier New', monospace;
            font-size: 1.1rem;
            word-break: break-all;
        }

        .stats {
            margin-top: 10px;
            font-size: 0.9rem;
            opacity: 0.9;
        }

        .users-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 15px;
        }

        .user-count {
            background: #764ba2;
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.9rem;
        }

        .user-list {
            list-style: none;
            margin-bottom: 25px;
            max-height: 400px;
            overflow-y: auto;
        }

        .user-list li {
            background: #f8f9fa;
            margin: 10px 0;
            padding: 15px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 15px;
            transition: all 0.3s ease;
            border: 1px solid #e9ecef;
        }

        .user-list li:hover {
            background: #e9ecef;
            transform: translateX(5px);
            border-color: #764ba2;
        }

        .user-avatar {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 1.2rem;
        }

        .user-info {
            flex: 1;
        }

        .user-name {
            font-size: 1.1rem;
            font-weight: bold;
            color: #333;
        }

        .user-details {
            font-size: 0.85rem;
            color: #666;
            margin-top: 4px;
        }

        .form-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 20px;
        }

        .form-group input {
            flex: 1;
            padding: 12px 15px;
            border: 2px solid #e9ecef;
            border-radius: 10px;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: #764ba2;
            box-shadow: 0 0 0 3px rgba(118, 75, 162, 0.1);
        }

        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn:active {
            transform: translateY(0);
        }

        .console-badge {
            background: #2d3748;
            color: #68d391;
            padding: 8px 12px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 0.8rem;
            margin-top: 15px;
            text-align: center;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .user-list li {
            animation: fadeIn 0.3s ease;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #999;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h2>📊 Массив чисел</h2>
            <div class="numbers-panel">
                <h3>📝 Массив данных:</h3>
                <div class="numbers-display" id="numbersDisplay"></div>
                <div class="stats" id="numbersStats"></div>
            </div>
        </div>

        <div class="card">
            <h2>👥 Список пользователей</h2>
            <div class="users-header">
                <div class="user-count" id="userCount">Всего: 0</div>
            </div>
            <ul class="user-list" id="userList"></ul>

            <div class="form-group">
                <input type="text" id="userName" placeholder="👤 Имя">
                <input type="number" id="userAge" placeholder="🎂 Возраст">
                <input type="text" id="userCity" placeholder="🏙️ Город">
                <button class="btn" id="addUserBtn">➕ Добавить пользователя</button>
            </div>
            <div class="console-badge">
                💡 Откройте консоль (F12) для просмотра всех операций с массивами
            </div>
        </div>
    </div>

    <script>
        let numbersArray = [42, 15, 7, 99, 23, 56];

        console.log("=".repeat(50));
        console.log("ЗАДАНИЕ 1: Создание массива чисел");
        console.log("Исходный массив:", numbersArray);
        console.log("Тип данных:", typeof numbersArray);
        console.log("Длина массива:", numbersArray.length);

        console.log("\n" + "=".repeat(50));
        console.log("ЗАДАНИЕ 2: Добавление нового числа в массив");
        let newNumber = 88;
        numbersArray.push(newNumber);
        console.log(`Добавлено число ${newNumber}`);
        console.log("Обновленный массив:", numbersArray);

        console.log("\n" + "=".repeat(50));
        console.log("ЗАДАНИЕ 3: Перебор массива и вывод каждого элемента");
        console.log("Перебор через цикл for:");
        for (let i = 0; i < numbersArray.length; i++) {
            console.log(`  numbersArray[${i}] = ${numbersArray[i]}`);
        }

        console.log("\nПеребор через forEach:");
        numbersArray.forEach(function(element, index) {
            console.log(`  Элемент ${index + 1}: ${element}`);
        });

        function updateNumbersDisplay() {
            let displayDiv = document.getElementById("numbersDisplay");
            let statsDiv = document.getElementById("numbersStats");

            displayDiv.innerHTML = `[ ${numbersArray.join(" | ")} ]`;

            let sum = numbersArray.reduce((acc, val) => acc + val, 0);
            let average = (sum / numbersArray.length).toFixed(2);
            let min = Math.min(...numbersArray);
            let max = Math.max(...numbersArray);

            statsDiv.innerHTML = `
                📊 Длина: ${numbersArray.length} элементов |
                📈 Сумма: ${sum} |
                📉 Среднее: ${average} |
                🔽 Мин: ${min} |
                🔼 Макс: ${max}
            `;
        }

        updateNumbersDisplay();

        console.log("\n" + "=".repeat(50));
        console.log("ЗАДАНИЕ 4: Создание объекта «Пользователь»");
        let sampleUser = {
            name: "Елена",
            age: 28,
            city: "Екатеринбург"
        };
        console.log("Пример объекта пользователь:", sampleUser);
        console.log("Доступ к свойствам:");
        console.log(`  Имя: ${sampleUser.name}`);
        console.log(`  Возраст: ${sampleUser.age}`);
        console.log(`  Город: ${sampleUser.city}`);

        console.log("\n" + "=".repeat(50));
        console.log("ЗАДАНИЕ 5: Создание массива пользователей (минимум 3 объекта)");

        let usersArray = [
            {
                name: "Александр",
                age: 25,
                city: "Москва"
            },
            {
                name: "Виктория",
                age: 22,
                city: "Санкт-Петербург"
            },
            {
                name: "Дмитрий",
                age: 31,
                city: "Казань"
            }
        ];

        console.log("Массив пользователей:", usersArray);
        console.log("Количество пользователей:", usersArray.length);

        function getUserInitials(name) {
            return name.charAt(0).toUpperCase();
        }

        function renderUsersList() {
            let userListElement = document.getElementById("userList");
            let userCountElement = document.getElementById("userCount");

            userCountElement.textContent = `Всего: ${usersArray.length}`;

            if (usersArray.length === 0) {
                userListElement.innerHTML = '<div class="empty-state">✨ Пока нет пользователей. Добавьте первого!</div>';
                return;
            }

            userListElement.innerHTML = "";

            usersArray.forEach(function(user, index) {
                let li = document.createElement("li");

                let avatar = document.createElement("div");
                avatar.className = "user-avatar";
                avatar.textContent = getUserInitials(user.name);

                let userInfo = document.createElement("div");
                userInfo.className = "user-info";

                let nameSpan = document.createElement("div");
                nameSpan.className = "user-name";
                nameSpan.textContent = user.name;

                let detailsSpan = document.createElement("div");
                detailsSpan.className = "user-details";
                detailsSpan.innerHTML = `🎂 ${user.age} лет &nbsp;|&nbsp; 🏙️ ${user.city}`;

                userInfo.appendChild(nameSpan);
                userInfo.appendChild(detailsSpan);

                li.appendChild(avatar);
                li.appendChild(userInfo);

                userListElement.appendChild(li);
            });

            console.log(`\n✅ Список пользователей обновлен. Текущее количество: ${usersArray.length}`);
        }

        renderUsersList();

        console.log("\n" + "=".repeat(50));
        console.log("ЗАДАНИЕ 6: Вывод списка пользователей на страницу в виде <ul>");
        console.log("✓ Список успешно отображен на странице в виде стилизованных элементов");

        let addButton = document.getElementById("addUserBtn");

        addButton.addEventListener("click", function() {
            let nameInput = document.getElementById("userName");
            let ageInput = document.getElementById("userAge");
            let cityInput = document.getElementById("userCity");

            let name = nameInput.value.trim();
            let age = ageInput.value.trim();
            let city = cityInput.value.trim();

            if (name === "") {
                alert("❌ Пожалуйста, введите имя!");
                nameInput.focus();
                return;
            }

            if (age === "" || isNaN(age) || parseInt(age) <= 0 || parseInt(age) > 120) {
                alert("❌ Пожалуйста, введите корректный возраст (от 1 до 120)!");
                ageInput.focus();
                return;
            }

            if (city === "") {
                alert("❌ Пожалуйста, введите город!");
                cityInput.focus();
                return;
            }

            let newUser = {
                name: name,
                age: parseInt(age),
                city: city
            };

            console.log("\n" + "=".repeat(50));
            console.log("ЗАДАНИЕ 7: Добавление нового пользователя");
            console.log("Создан новый объект пользователя:", newUser);

            usersArray.push(newUser);
            console.log("Пользователь добавлен в массив методом push()");
            console.log("Обновленный массив пользователей:", usersArray);

            renderUsersList();

            nameInput.value = "";
            ageInput.value = "";
            cityInput.value = "";

            nameInput.focus();

            console.log(`✓ Список на странице автоматически обновлен. Всего пользователей: ${usersArray.length}`);
        });

        console.log("\n" + "=".repeat(50));
        console.log("📌 Итоговое состояние:");
        console.log(`  • Массив чисел: [${numbersArray.join(", ")}]`);
        console.log(`  • Массив пользователей содержит ${usersArray.length} записей`);
        console.log("  • Интерфейс готов к добавлению новых пользователей через кнопку");
        console.log("=".repeat(50));

        window.addEventListener("load", function() {
            console.log("\n🎉 Страница полностью загружена!");
            console.log("💡 Подсказка: попробуйте добавить нового пользователя через форму");
        });
    </script>
</body>
</html>
