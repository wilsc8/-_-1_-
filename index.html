<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Лабораторная работа №6 - Работа с DOM</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            transition: background-color 0.3s, color 0.3s;
            padding: 20px;
            max-width: 800px;
            margin: 0 auto;
        }

        .dark-theme {
            background-color: #1a1a2e;
            color: #eee;
        }

        .dark-theme button {
            background-color: #16213e;
            color: #eee;
            border-color: #0f3460;
        }

        .dark-theme .highlight {
            background-color: #0f3460;
            border-color: #e94560;
        }

        .container {
            margin: 20px 0;
            padding: 20px;
            border-radius: 8px;
            background-color: #f9f9f9;
            border: 1px solid #ddd;
        }

        .dark-theme .container {
            background-color: #16213e;
            border-color: #0f3460;
        }

        button {
            margin: 5px;
            padding: 10px 15px;
            cursor: pointer;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            transition: 0.3s;
        }

        button:hover {
            opacity: 0.8;
        }

        .text-block {
            margin: 20px 0;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }

        .highlight {
            background-color: #ffff99;
            border: 2px solid #ff9800;
            padding: 15px;
            font-weight: bold;
        }

        .dark-theme .highlight {
            background-color: #0f3460;
            border-color: #e94560;
            color: #eee;
        }

        .hidden {
            display: none;
        }

        .colorful {
            color: #e94560;
            font-size: 18px;
        }

        .theme-toggle {
            background-color: #ff9800;
        }

        .add-class-btn {
            background-color: #2196F3;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Исходный заголовок</h1>

        <p id="mainParagraph">Это абзац для демонстрации изменения цвета и работы с DOM. Нажмите на кнопки ниже, чтобы увидеть изменения.</p>

        <div>
            <button id="changeTitleBtn">Изменить заголовок</button>
            <button id="changeColorBtn">Изменить цвет абзаца</button>
        </div>

        <div class="text-block" id="textBlock">
            Этот блок можно скрывать и показывать. Здесь находится важная информация, которую вы можете скрыть или показать с помощью кнопок.
        </div>

        <div>
            <button id="hideTextBtn">Скрыть текст</button>
            <button id="showTextBtn">Показать текст</button>
        </div>

        <div>
            <button id="addClassBtn" class="add-class-btn">Добавить класс к блоку</button>
        </div>

        <div>
            <button id="themeToggleBtn" class="theme-toggle">Переключить тему (светлая/тёмная)</button>
        </div>
    </div>

    <script>
        const title = document.querySelector("h1");
        const paragraph = document.getElementById("mainParagraph");
        const textBlock = document.getElementById("textBlock");
        const changeTitleBtn = document.getElementById("changeTitleBtn");
        const changeColorBtn = document.getElementById("changeColorBtn");
        const hideTextBtn = document.getElementById("hideTextBtn");
        const showTextBtn = document.getElementById("showTextBtn");
        const addClassBtn = document.getElementById("addClassBtn");
        const themeToggleBtn = document.getElementById("themeToggleBtn");

        changeTitleBtn.addEventListener("click", function() {
            title.textContent = "Новый изменённый заголовок!";
        });

        changeColorBtn.addEventListener("click", function() {
            paragraph.style.color = "red";
            paragraph.style.fontWeight = "bold";
        });

        hideTextBtn.addEventListener("click", function() {
            textBlock.style.display = "none";
        });

        showTextBtn.addEventListener("click", function() {
            textBlock.style.display = "block";
        });

        addClassBtn.addEventListener("click", function() {
            textBlock.classList.toggle("highlight");
        });

        themeToggleBtn.addEventListener("click", function() {
            document.body.classList.toggle("dark-theme");

            if(document.body.classList.contains("dark-theme")) {
                themeToggleBtn.textContent = "Светлая тема";
            } else {
                themeToggleBtn.textContent = "Тёмная тема";
            }
        });
    </script>
</body>
</html>
